services:
  factory-db:
    image: postgres:17-alpine
    container_name: factory-db
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory_local
    ports:
      - "5433:5432"
    volumes:
      - factory-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./db/004-work-log.sql:/docker-entrypoint-initdb.d/03-work-log.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  factory-panel:
    build: ./frontend
    container_name: factory-panel
    environment:
      # dentro de la red compose la DB escucha en 5432 (no el 5433 mapeado al host)
      FACTORY_DB_HOST: factory-db
      FACTORY_DB_PORT: "5432"
      FACTORY_DB_NAME: factory
      FACTORY_DB_USER: factory_reader
      FACTORY_DB_PASSWORD: factory_reader_local
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      factory-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  factory-db-data:
